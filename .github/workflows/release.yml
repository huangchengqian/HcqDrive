name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch or tag) to build from'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -n1)
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Built: $APK"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.locate.outputs.apk_path }}
          if-no-files-found: error

  release:
    name: Attach to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          body: |
            ## HcqDrive ${{ github.ref_name }}

            Auto-built debug APK from commit ${{ github.sha }}.

            > **Note**: This is a debug build signed with the Android debug key.
            > For Play Store distribution, switch to a signed release build.

            ### Install

            1. Download `app-debug.apk` below
            2. On your Android phone, enable "Install unknown apps" for your file manager
            3. Tap the APK to install
            4. Open the app → tap **Start Service** → grant permissions → note the 6-digit code
            5. On any device on the same Wi-Fi, open the URL shown and enter the code

            Requires Android 7.0+ (API 24).
